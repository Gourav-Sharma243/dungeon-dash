name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npx vite build

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only hosting --project dungeon-dash-9c803 --non-interactive --token ${{ secrets.FIREBASE_TOKEN }}
